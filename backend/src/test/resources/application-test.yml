# 测试环境配置 - 使用 H2 内存数据库
spring:
  datasource:
    url: jdbc:h2:mem:plan_system_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  sql:
    init:
      mode: always

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-secret-key-for-unit-tests-only-do-not-use-in-production
  expiration: 28800

file:
  upload-dir: ./target/test-uploads
  max-size: 10MB
