<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('消息通知')" />
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content">
    <div class="ibox float-e-margins">
        <div class="ibox-title"><h5>消息通知</h5>
            <div class="ibox-tools">
                <shiro:hasPermission name="notification:notification:read">
                    <button class="btn btn-white btn-sm" onclick="markAllRead()"><i class="fa fa-check-square-o"></i> 全部标为已读</button>
                </shiro:hasPermission>
            </div>
        </div>
        <div class="ibox-content">
            <table id="notifyTable" class="table table-striped"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:src="@{/ruoyi/js/notification/notification.js}"></script>
</body>
</html>
