<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('我的计划')" />
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>我的计划列表</h5>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-sm-12">
                            <form class="form-horizontal" id="searchForm">
                                <div class="form-group">
                                    <label class="col-sm-1 control-label">类型</label>
                                    <div class="col-sm-2">
                                        <select name="planType" class="form-control">
                                            <option value="">全部</option>
                                            <option value="DAILY">日报</option>
                                            <option value="WEEKLY">周报</option>
                                            <option value="MONTHLY">月报</option>
                                        </select>
                                    </div>
                                    <label class="col-sm-1 control-label">状态</label>
                                    <div class="col-sm-2">
                                        <select name="status" class="form-control">
                                            <option value="">全部</option>
                                            <option value="DRAFT">草稿</option>
                                            <option value="SUBMITTED">已提交</option>
                                            <option value="APPROVING">审批中</option>
                                            <option value="APPROVED">已通过</option>
                                            <option value="REJECTED">待修改</option>
                                            <option value="ARCHIVED">已归档</option>
                                            <option value="OVERDUE">已逾期</option>
                                        </select>
                                    </div>
                                    <label class="col-sm-1 control-label">关键词</label>
                                    <div class="col-sm-2">
                                        <input type="text" name="title" class="form-control" placeholder="计划标题"/>
                                    </div>
                                    <div class="col-sm-2">
                                        <button type="button" class="btn btn-primary" onclick="searchPlan()">查询</button>
                                        <button type="button" class="btn btn-default" onclick="resetSearch()">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12">
                            <div id="toolbar">
                                <shiro:hasPermission name="plan:plan:add">
                                    <a class="btn btn-primary" onclick="addPlan()"><i class="fa fa-plus"></i> 新建计划</a>
                                </shiro:hasPermission>
                                <shiro:hasPermission name="plan:plan:export">
                                    <a class="btn btn-warning" onclick="exportPlans()"><i class="fa fa-download"></i> 导出Excel</a>
                                </shiro:hasPermission>
                            </div>
                            <table id="planTable" class="table table-striped"></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:src="@{/ruoyi/js/plan/plan.js}"></script>
</body>
</html>
